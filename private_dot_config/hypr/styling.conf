general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
    rounding = 0

    blur {
        enabled = false
    }
}

animations {
    enabled = yes

    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    animation = windows, 1, 3, overshot, slide
    animation = windowsOut, 1, 3, smoothOut, slide
    animation = layers, 1, 4, overshot, slide bottom
    animation = layersIn, 1, 3, overshot, slide bottom
    animation = layersOut, 1, 4, smoothOut, slide bottom
    animation = windowsMove, 1, 3, default
    animation = border, 1, 3, default
    animation = fade, 1, 3, smoothIn
    animation = fadeLayers, 0
    animation = fadeDim, 1, 3, smoothIn
    animation = workspaces, 1, 3, default
}

layerrule = animation slide bottom, match:namespace ^eww-center-popup$
layerrule = no_anim on, match:namespace ^eww-center-trigger$
layerrule = no_anim on, match:namespace ^eww-center-hide$

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
  background_color = rgb(000000)

  middle_click_paste = false
}
