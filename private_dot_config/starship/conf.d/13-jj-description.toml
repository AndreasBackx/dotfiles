[custom.jj_description]
when = 'command -v jj >/dev/null 2>&1 && jj --ignore-working-copy root >/dev/null 2>&1'
command = '''
description=$(jj --ignore-working-copy log --no-graph -r @ -T 'description.first_line()' 2>/dev/null)
if [ -z "$description" ]; then
  exit 1
fi
printf '%s' "$description" | awk -v len=60 '{ if (length($0) > len) print substr($0, 1, len-3) "..."; else print; }'
'''
style = 'bold purple'
format = '[$output]($style) '
description = 'Jujutsu current commit description'
