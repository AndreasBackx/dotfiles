// Firefox AutoConfig must start with a comment line.

try {
  const { Services } = ChromeUtils.importESModule("resource://gre/modules/Services.sys.mjs");

  function isStartupPage(window) {
    const browser = window.gBrowser.selectedBrowser;
    const uri = browser?.currentURI?.spec ?? "";

    return uri === "about:blank" || uri === "about:newtab" || uri === "about:home";
  }

  function focusUrlBar(window) {
    if (!window.gBrowser || !window.gURLBar || !isStartupPage(window)) {
      return;
    }

    window.gURLBar.focus();
    window.gURLBar.select();
  }

  function focusUrlBarWithRetries(window) {
    for (const delay of [0, 100, 300]) {
      window.setTimeout(() => focusUrlBar(window), delay);
    }
  }

  Services.obs.addObserver((window) => {
    focusUrlBarWithRetries(window);
  }, "browser-delayed-startup-finished");

  for (const window of Services.wm.getEnumerator("navigator:browser")) {
    focusUrlBarWithRetries(window);
  }
} catch (error) {
  Components.utils.reportError(error);
}
