[workspaces.associations]
mail = [1, 111]
media = [2, 112]
messages = [3, 109]
chats = [4, 110]
work_comm = [5, 105]
browser = [301, 101]

[monitors]
[monitors.work]
screen_timeout = 3600
lock_timeout = 300
default_profile = "desk"

[monitors.work.profile_settings.desk]
label = "Desk"

[monitors.work.profile_settings.desk_laptop]
label = "Desk + Laptop"

[monitors.work.left]
name = "Dell Inc. DELL U3219Q F2XWXV2"
workspaces = "left"
shikane_search = ["m=DELL U3219Q", "s=F2XWXV2", "v=Dell Inc."]
bar_position = "bottom"
mode = "3840x2160@60Hz"
position = "0x0"
scale = "1.25"
transform = 1
background = "~/.config/wallpapers/dark/2160x3840/ren-ran-HG5QX-GXV5A-unsplash.jpg"
profiles = ["desk", "desk_laptop"]

[monitors.work.center]
name = "Dell Inc. DELL U4025QW 1WM5M04"
workspaces = "center"
shikane_search = ["m=DELL U4025QW", "s=1WM5M04", "v=Dell Inc."]
bar_position = "bottom"
mode = "5120x2160@120Hz"
position = "1728x642"
scale = "1.25"
transform = 0
background = "~/.config/wallpapers/dark/2560x1440/jaime-lannister.jpg"
profiles = ["desk", "desk_laptop"]

[monitors.work.right]
name = "Dell Inc. DELL U2515H 9X2VY6A80A8L"
workspaces = "right"
shikane_search = ["m=DELL U2515H", "s=9X2VY6A80A8L", "v=Dell Inc."]
bar_position = "bottom"
mode = "2560x1440@60Hz"
position = "5824x150"
scale = "1"
transform = 3
background = "~/.config/wallpapers/dark/2160x3840/eberhard-grossgasteiger-7ZxpAr4cZ-U-unsplash.jpg"
